name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: 🧪 Test, Type-Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🧪 Run unit tests
        run: npm test -- --passWithNoTests --forceExit

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          NODE_ENV: production
